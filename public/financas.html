<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gennus - Despesas</title>
    <link rel="stylesheet" href="financas.css">
    <link rel="icon" type="image/svg+xml" href="/assets/gennus-favicon-A.svg">
</head>
<body>
    <main class="dashboard-page">
        <nav class="sidebar-main">
            <div class="sidebar-logo">GENNUS</div>
            <a href="dashboard.html" class="sidebar-link-root">DASHBOARD</a>
            <div class="sidebar-separator"></div>
            <a href="produtos.html" class="sidebar-link-root">PRODUTOS</a>
            <a href="vendas.html" class="sidebar-link-root">VENDAS</a>
            <a href="financas.html" class="sidebar-link-root active" style="color:var(--roxo)">DESPESAS</a>
            <div class="sidebar-separator"></div>
            <a href="login.html" class="logout-link">Sair</a>
        </nav>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Gestão de Despesas</h1>
                <p style="color: var(--texto-muted);">Visualize custos automáticos e cadastre gastos manuais.</p>
            </div>

            <section class="card-base">
                <h3>Cadastrar Novo Gasto (Luz, Aluguel, etc.)</h3>
                <form id="gasto-form">
                    <input type="hidden" id="gasto-id">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Descrição</label>
                            <input type="text" id="gasto-desc" placeholder="Ex: Conta de Luz" required>
                        </div>
                        <div class="input-group">
                            <label>Valor (R$)</label>
                            <input type="number" id="gasto-valor" step="0.01" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>nome da mae</label>
                        <input type="text" id="nomeMae" required>
                    </div>
                    <button type="submit" id="btn-salvar-gasto" style="margin-top: 20px;">Salvar Gasto</button>
                </form>
            </section>

            <section class="card-base">
                <h3>Lista de Despesas Totais</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Origem/Descrição</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-despesas-total"></tbody>
                    <tfoot>
                        <tr style="font-weight: bold; background: rgba(255,255,255,0.05);">
                            <td colspan="2">TOTAL DE DESPESAS</td>
                            <td id="total-geral-despesas" class="txt-vermelho">R$ 0,00</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </section>
        </div>
    </main>
    <script src="financas.js"></script>
</body>
</html>
