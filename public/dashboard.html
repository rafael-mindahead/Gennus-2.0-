<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gennus - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="dashboard-page">
        <nav class="sidebar-main">
            <div class="sidebar-logo">GENNUS</div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="sidebar-link-root active">Dashboard</a>
                <div class="sidebar-separator" style="height: 1px; background: rgba(255,255,255,0.05); margin: 10px 0;"></div>
                <a href="produtos.html" class="sidebar-link-root">Produtos</a>
                <a href="clientes.html" class="sidebar-link-root">Clientes</a>
                <a href="funcionarios.html" class="sidebar-link-root">Funcionários</a>
                <div class="sidebar-separator" style="height: 1px; background: rgba(255,255,255,0.05); margin: 10px 0;"></div>
                <a href="vendas.html" class="sidebar-link-root">Vendas</a>
                <a href="financas.html" class="sidebar-link-root">Despesas</a>
                <a href="charts.html" class="sidebar-link-root">Relatórios</a>
            </div>

            <div class="sidebar-footer">
                <a href="perfil.html" class="user-profile-card" style="text-decoration: none;">
                    <div class="user-avatar-placeholder" id="user-initials" style="width: 35px; height: 35px; border-radius: 50%; background: #a855f7; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff;">R</div>
                    <div class="user-info-text" style="display: flex; flex-direction: column; margin-left: 10px;">
                        <span class="user-name-small" id="side-user-name" style="font-size: 0.8rem; color: #fff; font-weight: bold;">Rafael</span>
                        <span class="user-role-small" style="font-size: 0.65rem; color: #a855f7;">Administrador</span>
                    </div>
                </a>
                <a href="login.html" style="color: #f87171; text-decoration: none; font-size: 0.7rem; display: block; margin-top: 15px; font-weight: bold; text-align: center;">Sair do Sistema</a>
            </div>
        </nav>

        <div class="dashboard-content" style="flex: 1; margin-left: 280px; padding: 40px;">
            <h1 id="welcome-title" style="font-family: 'Space Grotesk'; font-size: 2.2rem; margin-bottom: 25px;">Dashboard</h1>
            
            <div class="dashboard-values" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
                <div class="metric-card" style="background: #0c0c0c; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px;">
                    <h3 style="font-size: 0.7rem; color: #666; text-transform: uppercase;">Receita Bruta</h3>
                    <span id="dash-bruta" style="font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 700; display: block; margin-top: 10px; color: #22c55e;">R$ 0,00</span>
                </div>
                <div class="metric-card" style="background: #0c0c0c; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px;">
                    <h3 style="font-size: 0.7rem; color: #666; text-transform: uppercase;">Despesas Totais</h3>
                    <span id="dash-despesa" style="font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 700; display: block; margin-top: 10px; color: #f87171;">R$ 0,00</span>
                </div>
                <div class="metric-card" style="background: #0c0c0c; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px;">
                    <h3 style="font-size: 0.7rem; color: #666; text-transform: uppercase;">Lucro Líquido</h3>
                    <span id="dash-liquida" style="font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 700; display: block; margin-top: 10px; color: #a855f7;">R$ 0,00</span>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;">
                <div class="card-base" style="background: #0c0c0c; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; text-align: center;">
                    <h3 style="font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 20px;">Composição de Saídas</h3>
                    <div style="height: 250px; position: relative;">
                        <canvas id="chartPizza"></canvas>
                    </div>
                </div>
                <div class="card-base" style="background: #0c0c0c; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px;">
                    <h3 style="font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 20px;">Performance de Vendas</h3>
                    <div style="height: 250px; position: relative;">
                        <canvas id="chartLinha"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="dashboard.js"></script>
</body>
</html>
