<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gennus - Registrar Venda</title>
    <link rel="stylesheet" href="vendas.css">
    <link rel="icon" type="image/svg+xml" href="/assets/gennus-favicon-A.svg">
</head>
<body>
    <main class="dashboard-page">
        <nav class="sidebar-main">
            <div class="sidebar-logo"><a href="dashboard.html" style="text-decoration:none">GENNUS</a></div>
            <a href="dashboard.html" class="sidebar-link-root">DASHBOARD</a>
            <div class="sidebar-separator"></div>
            <a href="produtos.html" class="sidebar-link-root">PRODUTOS</a>
            <a href="vendas.html" class="sidebar-link-root active" style="color:var(--roxo)">VENDAS</a>
            <a href="renda.html" class="sidebar-link-root">RENDA</a>
            <div class="sidebar-separator"></div>
            <a href="login.html" class="logout-link">Sair</a>
        </nav>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Registrar Venda</h1>
                <p style="color: var(--texto-muted);">O estoque será atualizado automaticamente ao finalizar.</p>
            </div>

            <section class="card-base">
                <form id="venda-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Selecionar Produto</label>
                            <select id="venda-produto" required>
                                <option value="">Selecione um produto</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Quantidade</label>
                            <input type="number" id="venda-qtd" step="0.01" placeholder="Ex: 1.5" required>
                        </div>
                    </div>
                    <button type="submit" style="margin-top:20px;">Finalizar Venda</button>
                </form>
            </section>

            <section class="card-base">
                <h3>Vendas Recentes</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Total</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="lista-vendas-dia"></tbody>
                </table>
            </section>
        </div>
    </main>
    <script src="vendas.js"></script>
</body>
</html>
