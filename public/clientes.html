<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gennus - Gestão de Clientes</title>
    <link rel="stylesheet" href="clientes.css">
    <link rel="icon" type="image/svg+xml" href="/assets/gennus-favicon-A.svg">
</head>
<body>
    <main class="dashboard-page">
        <nav class="sidebar-main">
            <div class="sidebar-logo"><a href="dashboard.html" style="text-decoration:none">GENNUS</a></div>
            <a href="dashboard.html" class="sidebar-link-root">DASHBOARD</a>
            <div class="sidebar-separator"></div>
            <a href="clientes.html" class="sidebar-link-root active">CLIENTES</a>
            <a href="#" class="sidebar-link-root">FUNCIONÁRIOS</a>
            <div class="sidebar-separator"></div>
            <a href="login.html" class="logout-link">Sair</a>
        </nav>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Gestão de Clientes</h1>
                <p>Cadastre e gerencie sua base de contatos.</p>
            </div>

            <section class="card-base form-section">
                <form id="cliente-form">
                    <input type="hidden" id="cliente-id">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Nome Completo</label>
                            <input type="text" id="nome" placeholder="Ex: João Silva" required>
                        </div>
                        <div>
                            <label>nome da mae</label>
                            <input type="text" id="nomeMae" required>
                        </div>
                        <div class="input-group">
                            <label>E-mail</label>
                            <input type="email" id="email" placeholder="joao@email.com" required>
                        </div>
                        <div class="input-group">
                            <label>Telefone</label>
                            <input type="text" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="input-group">
                            <label>Documento (CPF/CNPJ)</label>
                            <input type="text" id="documento" placeholder="000.000.000-00">
                        </div>
                    </div>
                    <button type="submit" id="btn-salvar">Cadastrar Cliente</button>
                </form>
            </section>

            <section class="card-base table-section">
                <h3>Clientes Cadastrados</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th>Documento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-clientes">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <script src="clientes.js"></script>
</body>
</html>
